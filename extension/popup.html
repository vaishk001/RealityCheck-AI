<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealityCheck AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="header-logo">
      <img src="icons/icon48.png" alt="RealityCheck AI" class="logo-img" />
      <div class="header-text">
        <span class="brand-name">RealityCheck</span>
        <span class="brand-ai">AI</span>
      </div>
    </div>
    <span class="version-badge">v1.1</span>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       CURRENT URL STRIP
  ═══════════════════════════════════════════════════════ -->
  <div class="url-strip">
    <span class="url-icon">🔗</span>
    <span id="current-url" class="url-text" title="">—</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT AREA
  ═══════════════════════════════════════════════════════ -->
  <main id="main-content">

    <!-- ── LOADING STATE ───────────────────────────────── -->
    <div id="state-loading" class="state hidden">
      <div class="scan-animation">
        <div class="radar-ring ring-1"></div>
        <div class="radar-ring ring-2"></div>
        <div class="radar-ring ring-3"></div>
        <div class="scan-dot"></div>
      </div>
      <p class="loading-text">Scanning<span class="dots"></span></p>
      <p class="loading-sub">Contacting threat intelligence services…</p>
    </div>

    <!-- ── RESULT STATE ────────────────────────────────── -->
    <div id="state-result" class="state hidden">

      <!-- Score + Status -------------------------------- -->
      <div class="score-section">
        <div id="score-ring" class="score-ring">
          <svg class="score-svg" viewBox="0 0 120 120">
            <circle class="score-track" cx="60" cy="60" r="52" />
            <circle id="score-arc" class="score-arc" cx="60" cy="60" r="52"
              stroke-dasharray="326.7"
              stroke-dashoffset="326.7"
            />
          </svg>
          <div class="score-inner">
            <span id="score-value" class="score-value">0</span>
            <span class="score-label">/ 100</span>
          </div>
        </div>

        <div class="score-meta">
          <div id="status-badge" class="status-badge">—</div>
          <p id="risk-label" class="risk-label">Risk Score</p>
        </div>
      </div>

      <!-- Summary --------------------------------------- -->
      <div class="card" id="summary-card">
        <h3 class="card-title">
          <span class="card-icon">🧠</span> AI Summary
        </h3>
        <p id="summary-text" class="summary-text">—</p>
      </div>

      <!-- Reasons --------------------------------------- -->
      <div class="card" id="reasons-card">
        <h3 class="card-title">
          <span class="card-icon">⚠️</span> Top Risk Signals
        </h3>
        <ul id="reasons-list" class="reasons-list"></ul>
      </div>

    </div>

    <!-- ── ERROR STATE ────────────────────────────────── -->
    <div id="state-error" class="state hidden">
      <div class="error-icon">⚡</div>
      <p id="error-title" class="error-title">Something went wrong</p>
      <p id="error-message" class="error-message">—</p>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════════════════
       FOOTER ACTIONS
  ═══════════════════════════════════════════════════════ -->
  <footer class="footer">
    <button id="btn-scan" class="btn btn-primary" disabled>
      <span class="btn-icon">🔍</span> Scan This Page
    </button>
    <button id="btn-open-app" class="btn btn-ghost" title="Open full dashboard">
      <span class="btn-icon">↗</span> Dashboard
    </button>
  </footer>

  <!-- ═══════════════════════════════════════════════════════
       DEBUG ROW  (test overlay without waiting for background scan)
  ═══════════════════════════════════════════════════════ -->
  <div class="debug-row">
    <button id="btn-test-dangerous" class="btn btn-debug btn-debug-danger" title="Inject a fake Dangerous overlay to verify content.js works">
      🧪 Test Dangerous
    </button>
    <button id="btn-test-suspicious" class="btn btn-debug btn-debug-warn" title="Inject a fake Suspicious overlay">
      ⚠️ Test Suspicious
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
